<!DOCTYPE html>
<html>
<head>
<title>My First Web Page</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background-color: #c12622;
        color: white;
        text-align: center;
        font-size: 50px;
    }

    h1:hover, p:hover, a:hover {
        transform: scale(1.2);
        transition: transform 0.3s ease;
    }

    h1, p, a {
        transition: transform 0.3s ease;
    }

    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: white;
        z-index: 1000;
        display: flex;
        align-items: center;
        padding: 0 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .top-bar img {
        height: 100%;
        width: auto;
    }

    .top-bar nav {
        margin-left: 20px; /* Adjusted to bring the navigation bar slightly to the left */
        display: flex;
        align-items: center; /* Centered text vertically */
    }

    .top-bar nav a {
        margin: 0 10px;
        text-decoration: none;
        color: #333;
        font-size: 18px; /* Increased font size */
        font-family: Arial, sans-serif; /* Changed to a simpler font */
    }

    .top-bar nav a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
    <div class="top-bar">
        <img src="Screenshot 2025-05-15 at 16.30.30.png" alt="Top Left Image" onclick="location.href='index.html'" style="cursor: pointer;">
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
    <h1>Hello RedTest.ai!</h1>
    <p>This is my first HTML page.</p>
</body>
</html>
